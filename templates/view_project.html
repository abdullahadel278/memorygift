<!DOCTYPE html>
<html>

<head>

<title>{{ project.person_name }}</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

body{

margin:0;
padding:0;
font-family:Arial;
overflow-x:hidden;

}

/* THEMES */

.dark{

background:#0f0f0f;
color:white;

}

.birthday{

background:
linear-gradient(
135deg,
#ff4fd8,
#7a5cff
);

color:white;

}

.scrapbook{

background:#d8c3a5;
color:#2d1f16;

}

.wedding{

background:
linear-gradient(
135deg,
#ffffff,
#f2d6b3
);

color:#111;

}

.galaxy{

background:
linear-gradient(
135deg,
#050816,
#1a1f4f
);

color:white;

}

.memorial{

background:
linear-gradient(
135deg,
#111,
#3a2c2c
);

color:white;

}

/* PAGE */

.page{

width:100%;
display:flex;
justify-content:center;
padding:40px 20px;
box-sizing:border-box;

}

.memory-card{

width:100%;
max-width:900px;

padding:40px;

border-radius:30px;

display:flex;
flex-direction:column;
align-items:center;

background:
rgba(255,255,255,0.15);

backdrop-filter:blur(10px);

box-sizing:border-box;

}

/* TITLE */

.memory-title{

font-size:50px;
font-family:cursive;
margin-bottom:10px;

}

/* STACK */

.stack{

position:relative;

width:500px;
height:600px;

margin-top:40px;

display:flex;
justify-content:center;
align-items:center;

perspective:2000px;

}

.stack img{

position:absolute;

width:100%;
height:100%;

object-fit:cover;

border-radius:20px;

padding:10px;

background:white;

box-shadow:
0 20px 40px rgba(0,0,0,0.3);

transition:
transform 1s ease,
opacity 1s ease;

}

/* CARDS */

.card-active{

z-index:5;

transform:
rotate(0deg)
translateX(0)
scale(1);

opacity:1;

}

.card-next{

z-index:4;

transform:
rotate(8deg)
translateX(35px)
translateY(20px)
scale(0.95);

opacity:0.7;

}

.card-prev{

z-index:3;

transform:
rotate(-8deg)
translateX(-35px)
translateY(20px)
scale(0.95);

opacity:0.5;

}

.card-hidden{

opacity:0;

transform:
rotate(20deg)
translateX(150px)
scale(0.7);

}

/* BUTTONS */

.controls{

margin-top:30px;

}

.controls button{

border:none;

padding:15px 25px;

border-radius:20px;

font-size:18px;

cursor:pointer;

margin:10px;

background:#5c4033;
color:white;

transition:0.3s;

}

.controls button:hover{

transform:scale(1.08);

}

/* TEXT */

.caption{

margin-top:40px;

font-size:36px;
font-weight:bold;

line-height:2;

max-width:700px;
text-align:center;

}

.date{

margin-top:15px;
opacity:0.8;

}

/* AUDIO */

audio{

margin-top:30px;
width:100%;
max-width:500px;

}

/* SHARE */

.share-buttons{

margin-top:40px;
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;

}

.share-buttons button{

padding:15px 25px;
border:none;
border-radius:20px;
cursor:pointer;
font-size:16px;

background:#8c52ff;
color:white;

}

/* QR */

.qr-box{

margin-top:30px;
display:none;
flex-direction:column;
align-items:center;

}

.qr{

background:white;

padding:15px;

border-radius:20px;

width:180px;

}

/* FOOTER */

.footer{

margin-top:60px;
opacity:0.6;
font-size:15px;

}

/* MOBILE */

@media(max-width:700px){

.stack{

width:300px;
height:400px;

}

.memory-card{

padding:20px;

}

.memory-title{

font-size:35px;

}

}

</style>

</head>

<body class="{{ project.theme }}">

<div class="page">

<div class="memory-card">

<h1 class="memory-title">
{{ project.title }}
</h1>

<h2>
{{ project.person_name }}
</h2>

<p class="date">
{{ project.event_date }}
</p>

<div class="stack">

{% for image in images %}

<img
src="{{ url_for('static', filename='uploads/' + image) }}"
class="
{% if loop.index0 == 0 %}
card-active
{% elif loop.index0 == 1 %}
card-next
{% elif loop.index0 == 2 %}
card-prev
{% else %}
card-hidden
{% endif %}
"
>

{% endfor %}

</div>

<div class="controls">

<button onclick="prevCard()">
⟵ Previous
</button>

<button onclick="nextCard()">
Next ⟶
</button>

</div>

<p class="caption">
{{ project.caption }}
</p>

<audio controls autoplay>

<source
src="{{ url_for('static', filename='music/' + project.music) }}"
>

</audio>

<div class="share-buttons">

<button onclick="copyLink()">

Copy Link 🔗

</button>

<button onclick="toggleQR()">

Share Memory 📲

</button>

</div>

<div class="qr-box" id="qrBox">

<br>

<img
src="{{ url_for('static', filename='qrcodes/' + project.slug + '.png') }}"
class="qr"
>

</div>

<div class="footer">

Created By Abdullah Adel

</div>

</div>

</div>

<script>

let cards = document.querySelectorAll(".stack img")

let current = 0

function updateCards(){

cards.forEach((card,index)=>{

card.classList.remove(
"card-active",
"card-next",
"card-prev",
"card-hidden"
)

if(index === current){

card.classList.add("card-active")

}

else if(index === (current + 1) % cards.length){

card.classList.add("card-next")

}

else if(index === (current - 1 + cards.length) % cards.length){

card.classList.add("card-prev")

}

else{

card.classList.add("card-hidden")

}

})

}

function nextCard(){

current++

if(current >= cards.length){

current = 0

}

updateCards()

}

function prevCard(){

current--

if(current < 0){

current = cards.length - 1

}

updateCards()

}

function copyLink(){

navigator.clipboard.writeText(
window.location.href
)

alert("Link Copied 🔗")

}

function toggleQR(){

let qr =
document.getElementById("qrBox")

if(qr.style.display === "flex"){

qr.style.display = "none"

}

else{

qr.style.display = "flex"

}

}

</script>

</body>

</html>
