<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

.form-box{

max-width:500px;
margin:auto;
background:#171717;
padding:40px;
border-radius:30px;
margin-top:80px;

}

input{

width:100%;
padding:15px;
border:none;
border-radius:15px;
margin-bottom:20px;
background:#1f1f1f;
color:white;
font-size:16px;

}

.bottom-text{

margin-top:20px;
color:#999;

}

a{

color:white;

}

</style>

</head>

<body>

<div class="container">

<div class="form-box">

<h1>
Welcome Back 👋
</h1>

<p style="color:#aaa;">
Login to continue creating memories.
</p>

<br>

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required
>

<input
type="password"
name="password"
placeholder="Password"
required
>

<button class="btn">
Login
</button>

</form>

<p class="bottom-text">

Don't have an account?

<a href="/register">
Register
</a>

</p>

</div>

</div>

</body>
</html>
