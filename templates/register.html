<!DOCTYPE html>
<html>

<head>

<title>Register</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

body{

background:
radial-gradient(circle at top,#34115e,#0f0f0f 40%);

min-height:100vh;

}

.form-box{

max-width:500px;
margin:auto;
background:#171717;
padding:50px;
border-radius:30px;
margin-top:80px;
border:1px solid rgba(255,255,255,0.05);

box-shadow:
0 0 50px rgba(140,82,255,0.15);

}

.form-box h1{

font-size:50px;
margin-bottom:10px;

}

.form-box p{

color:#999;
margin-bottom:40px;

}

input{

width:100%;
padding:18px;
border:none;
outline:none;
border-radius:15px;
margin-bottom:20px;
background:#101010;
color:white;
font-size:16px;
border:1px solid rgba(255,255,255,0.05);

}

input:focus{

border:1px solid #8c52ff;

}

.btn{

width:100%;
background:#8c52ff;
color:white;
border:none;
cursor:pointer;

}

.bottom-text{

margin-top:25px;
text-align:center;
color:#999;

}

.bottom-text a{

color:#8c52ff;
text-decoration:none;

}

.logo{

text-align:center;
font-size:32px;
font-weight:bold;
margin-top:40px;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

Memory Gift 🎉

</div>

<div class="form-box">

<h1>
Create Account ✨
</h1>

<p>
Start creating beautiful memory pages.
</p>

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required
>

<input
type="password"
name="password"
placeholder="Password"
required
>

<button class="btn">

Register

</button>

</form>

<div class="bottom-text">

Already have an account?

<a href="/login">
Login
</a>

</div>

</div>

</div>

</body>
</html>
